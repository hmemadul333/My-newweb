<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Digital Notebook</title>
    
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "d67610a1-181e-42cd-a2d2-837d92d2bb16",
          safari_web_id: "web.onesignal.auto.20f3ee95-6f21-4aad-a9bb-9c5899a4353a",
          promptOptions: {
            slidedown: {
                prompts: [{
                    type: "push",
                    autoPrompt: true,
                    text: {
                      actionMessage: "আমাদের নতুন আপডেট পেতে সাবস্ক্রাইব করুন!",
                      acceptButton: "Allow",
                      cancelButton: "Cancel"
                    }
                }]
            }
          }
        });
      });
    </script>

    <style>
        body { background-color: #0f172a; color: #fff; font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .btn { background: #38bdf8; border: none; padding: 10px; border-radius: 8px; cursor: pointer; color: black; font-weight: bold; margin: 5px; text-decoration: none; display: inline-block; font-size: 0.9rem;}
        video { width: 100%; border-radius: 10px; margin-top: 10px; background: #000; }
        .details { color: #cbd5e1; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>My Digital Notebook</h1>

    <script>
        function updateCount(elementId) {
            let el = document.getElementById(elementId);
            let count = parseInt(el.innerText) || 0;
            el.innerText = count + 1;
        }
    </script>

    <div class="card">
        <h3>Cricket</h3>
        <p class="details">Cricket is my favorite sport.</p>
        <button class="btn" onclick="updateCount('like1')">Like <span id="like1">0</span></button>
        <button class="btn" onclick="updateCount('share1'); navigator.share({title: 'Cricket', url: window.location.href})">Share <span id="share1">0</span></button>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSe9VApsmSJrnDwu2HFf29SPIlybLgsw_q6_iTEdPbv1MzbCGg/viewform" target="_blank" class="btn" style="background:#22c55e;">Comment</a>
    </div>

    <div class="card">
        <h3>Football</h3>
        <p class="details">Football is a very popular game.</p>
        <button class="btn" onclick="updateCount('like2')">Like <span id="like2">0</span></button>
        <button class="btn" onclick="updateCount('share2'); navigator.share({title: 'Football', url: window.location.href})">Share <span id="share2">0</span></button>
        <a href="https://docs.google.com/forms/d/e/1FAIpQLSe9VApsmSJrnDwu2HFf29SPIlybLgsw_q6_iTEdPbv1MzbCGg/viewform" target="_blank" class="btn" style="background:#22c55e;">Comment</a>
    </div>

    <div class="card">
        <h3>Video Gallery</h3>
        <p>Jinwoo Edit</p>
        <video controls><source src="https://raw.githubusercontent.com/hmemadul333/My-newweb/main/jinwoo-edit.mp4" type="video/mp4"></video>
        <br>
        <button class="btn" onclick="updateCount('v1')">Like <span id="v1">0</span></button>
        <button class="btn" onclick="updateCount('s1'); navigator.share({url: window.location.href})">Share <span id="s1">0</span></button>
    </div>
</div>

</body>
</html>
