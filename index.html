<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Digital Notebook</title>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "d67610a1-181e-42cd-a2d2-837d92d2bb16",
          safari_web_id: "web.onesignal.auto.20f3ee95-6f21-4aad-a9bb-9c5899a4353a",
          notifyButton: { enable: true },
        });
      });
    </script>
    <style>
        body { background-color: #0f172a; color: #fff; font-family: sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .btn { background: #38bdf8; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; color: black; font-weight: bold; margin: 5px; font-size: 0.8rem; }
        video { width: 100%; border-radius: 10px; margin-top: 10px; background: #000; }
        .action-bar { margin-top: 10px; display: flex; gap: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center; margin-bottom: 20px;">
        <a href="https://translate.google.com/translate?sl=en&tl=bn&u=https://hmemadul333.github.io/My-newweb/" class="btn" style="padding: 10px 20px;">Translate to Bangla</a>
    </div>

    <h1>My Digital Notebook</h1>

    <div class="card">
        <h3>Cricket</h3>
        <p>Cricket is my favorite sport. I love cricket very much and I play it occasionally with my friends.</p>
        <div class="action-bar">
            <button class="btn" onclick="this.innerText='Liked ❤️'">Like</button>
            <button class="btn" onclick="prompt('Write your comment:')">Comment</button>
            <button class="btn" onclick="navigator.share({title: 'Cricket', url: window.location.href})">Share</button>
        </div>
    </div>

    <div class="card">
        <h3>Video Gallery</h3>
        
        <p>Jinwoo Edit</p>
        <video controls><source src="https://raw.githubusercontent.com/hmemadul333/My-newweb/main/jinwoo-edit.mp4" type="video/mp4"></video>
        <div class="action-bar">
            <button class="btn" onclick="this.innerText='Liked ❤️'">Like</button>
            <button class="btn" onclick="prompt('Comment on Jinwoo Edit:')">Comment</button>
            <button class="btn" onclick="navigator.share({title: 'Jinwoo Edit', url: window.location.href})">Share</button>
        </div>

        <p style="margin-top:20px;">Muzan Edit</p>
        <video controls><source src="https://raw.githubusercontent.com/hmemadul333/My-newweb/main/muzan-edit.mp4" type="video/mp4"></video>
        <div class="action-bar">
            <button class="btn" onclick="this.innerText='Liked ❤️'">Like</button>
            <button class="btn" onclick="prompt('Comment on Muzan Edit:')">Comment</button>
            <button class="btn" onclick="navigator.share({title: 'Muzan Edit', url: window.location.href})">Share</button>
        </div>
    </div>
</div>

</body>
</html>
