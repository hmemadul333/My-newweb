<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Digital Notebook</title>
    <style>
        body { background-color: #0f172a; color: #fff; font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-size: 2rem; text-align: center; margin-bottom: 20px; }
        h3 { font-size: 1.5rem; margin-bottom: 10px; }
        p { font-size: 1.1rem; margin-bottom: 15px; }
        .card { background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .btn { background: #38bdf8; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; color: #000; font-weight: bold; margin: 5px; width: 45%; }
        video { width: 100%; border-radius: 10px; margin-top: 10px; background: #000; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center;">
        <button class="btn" onclick="window.location.href='https://translate.google.com/translate?sl=en&tl=bn&u=https://hmemadul333.github.io/My-newweb/'">Translate</button>
        <button class="btn" onclick="alert('Subscribe system needs API configuration')">Subscribe</button>
    </div>

    <h1>My Digital Notebook</h1>

    <div class="card">
        <h3>Cricket</h3>
        <p>Cricket is my favorite sport.</p>
        <button class="btn">Like</button>
        <button class="btn">Comment</button>
    </div>

    <div class="card">
        <h3>Football</h3>
        <p>Football is a very popular game.</p>
        <button class="btn">Like</button>
        <button class="btn">Comment</button>
    </div>

    <div class="card">
        <h3>Video Gallery</h3>
        <video controls><source src="https://raw.githubusercontent.com/hmemadul333/My-newweb/main/jinwoo-edit.mp4" type="video/mp4"></video>
        <video controls><source src="https://raw.githubusercontent.com/hmemadul333/My-newweb/main/muzan-edit.mp4" type="video/mp4"></video>
        <video controls><source src="https://raw.githubusercontent.com/hmemadul333/My-newweb/main/suzume-song.mp4" type="video/mp4"></video>
    </div>
</div>

</body>
</html>
