<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Digital Notebook</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0f172a; --card: rgba(255, 255, 255, 0.08); --accent: #38bdf8; }
        body { background-color: var(--bg); font-family: 'Poppins', sans-serif; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .btn { background: var(--accent); color: #000; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px 2px; display: inline-block; text-decoration: none; font-size: 0.9em; }
        video { width: 100%; border-radius: 15px; margin-top: 10px; background: #000; }
        .comment-box { display: none; margin-top: 10px; }
        input { background: #1e293b; border: 1px solid #444; color: white; padding: 8px; width: 60%; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <a href="https://translate.google.com/translate?sl=en&tl=bn&u=https://hmemadul333.github.io/My-newweb/" class="btn">Translate</a>
    <button class="btn" onclick="alert('Subscribe system is ready!')">Subscribe</button>

    <h1>My Digital Notebook</h1>

    <div class="card"><h3>Cricket</h3><p>Cricket is my favorite sport.</p>
        <button class="btn" onclick="this.innerHTML='Liked'">Like</button>
        <button class="btn" onclick="toggleC(this)">Comment</button>
        <div class="comment-box"><input type="text"><button onclick="addC(this)">Post</button><ul></ul></div>
    </div>

    <div class="card"><h3>Football</h3><p>Football is a very popular game.</p>
        <button class="btn" onclick="this.innerHTML='Liked'">Like</button>
        <button class="btn" onclick="toggleC(this)">Comment</button>
        <div class="comment-box"><input type="text"><button onclick="addC(this)">Post</button><ul></ul></div>
    </div>

    <div class="card"><h3>Video Gallery</h3>
        <video controls><source src="https://raw.githubusercontent.com/hmemadul333/My-newweb/main/11316.mp4" type="video/mp4"></video>
        <video controls><source src="https://raw.githubusercontent.com/hmemadul333/My-newweb/main/11105.mp4" type="video/mp4"></video>
        <video controls><source src="https://raw.githubusercontent.com/hmemadul333/My-newweb/main/11382.mp4" type="video/mp4"></video>
    </div>
</div>

<script>
    function toggleC(b) { let s = b.parentElement.querySelector('.comment-box'); s.style.display = (s.style.display === 'block') ? 'none' : 'block'; }
    function addC(b) { let ul = b.nextElementSibling; let li = document.createElement('li'); li.innerText = b.previousElementSibling.value; ul.appendChild(li); b.previousElementSibling.value = ''; }
</script>
</body>
</html>
